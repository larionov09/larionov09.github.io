<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Title</title>
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <p>только для 607-52а, числители и знаменатели автоматически отображаются верно</p>

            <div class="header__week_num_container">
                <div class="header__week_num_button" onclick="onClickPreviousWeek()">&lt;</div>
                <p class="header__week_num" id="weekNum">
                    Неделя 1
                </p>
                <div class="header__week_num_button" onclick="onClickNextWeek()">&gt;</div>
            </div>

            <div class="header__days">
                <div class="header__days__dayblock" id="day0elem">
                    <span>01<br>дек.</span>
                    <span class="header__days__dayblock__dayofweek">
                        ПН</span>
                </div>
                <div class="header__days__dayblock" id="day1elem">
                    <span>02<br>дек.</span>
                    <span class="header__days__dayblock__dayofweek">
                        ВТ</span>
                </div>
                <div class="header__days__dayblock" id="day2elem">
                    <span>03<br>дек.</span>
                    <span class="header__days__dayblock__dayofweek">
                        СР</span>
                </div>
                <div class="header__days__dayblock" id="day3elem">
                    <span>04<br>дек.</span>
                    <span class="header__days__dayblock__dayofweek">
                        ЧТ</span>
                </div>
                <div class="header__days__dayblock" id="day4elem">
                    <span>05<br>дек.</span>
                    <span class="header__days__dayblock__dayofweek">
                        ПТ</span>
                </div>
                <div class="header__days__dayblock" id="day5elem">
                    <span>06<br>дек.</span>
                    <span class="header__days__dayblock__dayofweek">
                        СБ</span>
                </div>
                <div class="header__days__dayblock" id="day6elem">
                    <span>07<br>дек.</span>
                    <span class="header__days__dayblock__dayofweek">
                        ВС</span>
                </div>
            </div>

        </header>
        <div class="lesson_holder" id="lessonHolder">

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
